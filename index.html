<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Kiwii Design — Accesorios de resina artesanales: llaveros, esferos, separadores, aretes, anillos, collares y más. Quito, Ecuador.">
<title>Kiwii Design — Accesorios de Resina</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--purple:#9b72d4;--purple-dark:#5c3b8f;--lavender:#e4d4ff;--cream:#fef9e7;--yellow:#ffe082;--green:#7cb342;--text:#3d2069;--card-bg:#faf5ff;--r:16px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:#c9aaff;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 1px,transparent 1px,transparent 40px);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.deco{position:fixed;pointer-events:none;z-index:0;font-size:1.4rem;opacity:.28;animation:floaty 7s ease-in-out infinite}
.deco:nth-child(1){top:4%;left:2%;animation-delay:0s}.deco:nth-child(2){top:20%;right:3%;animation-delay:1.3s}.deco:nth-child(3){top:50%;left:1%;animation-delay:2.6s}.deco:nth-child(4){top:70%;right:2%;animation-delay:.8s}.deco:nth-child(5){top:85%;left:3%;animation-delay:2s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-12px) rotate(4deg)}}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(92,59,143,.96);backdrop-filter:blur(14px);border-bottom:3px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:space-between;padding:0 .8rem;height:60px;gap:.5rem}
.nav-logo{height:46px;width:auto;display:block}
.nav-scroll{display:flex;gap:.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;padding:0 .3rem}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-scroll a{text-decoration:none;color:rgba(255,255,255,.88);font-weight:700;font-size:.73rem;white-space:nowrap;padding:.26rem .65rem;border-radius:50px;border:1.5px solid transparent;transition:all .2s}
.nav-scroll a:hover,.nav-scroll a.active{color:var(--yellow);border-color:var(--yellow);background:rgba(255,224,130,.12)}
.cart-btn{background:var(--yellow);border:none;border-radius:50px;padding:.4rem .8rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--purple-dark);cursor:pointer;display:flex;align-items:center;gap:.3rem;flex-shrink:0;box-shadow:3px 3px 0 rgba(0,0,0,.15);transition:transform .2s}
.cart-btn:active{transform:scale(.95)}
.cart-badge{background:var(--purple-dark);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.62rem;display:flex;align-items:center;justify-content:center;font-weight:800}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:2rem .8rem 1.5rem}
.hero-bubble{display:inline-block;background:var(--cream);border:4px solid var(--purple-dark);border-radius:22px;padding:.7rem 1.8rem;margin-bottom:.9rem;box-shadow:5px 5px 0 var(--purple-dark)}
.hero-bubble h1{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.8rem,6vw,3.2rem);color:var(--purple);line-height:1.1}
.hero-sub{font-size:.88rem;color:#fff;font-weight:700;margin-bottom:1.2rem;text-shadow:1px 2px 4px rgba(80,30,120,.4)}
.hero-pills{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;padding:0 .4rem}
.pill{background:rgba(255,255,255,.9);border-radius:50px;padding:.35rem .85rem;font-size:.76rem;font-weight:800;color:var(--purple-dark);border:2px solid var(--purple);cursor:pointer;transition:all .2s;white-space:nowrap}
.pill:hover,.pill.active{background:var(--purple);color:#fff;transform:translateY(-2px)}

/* BANNER */
.banner{position:relative;z-index:1;background:rgba(255,255,255,.15);border-top:3px solid rgba(255,255,255,.28);border-bottom:3px solid rgba(255,255,255,.28);padding:.65rem 0;overflow:hidden;margin-bottom:1.8rem}
.banner-track{display:flex;gap:2rem;width:max-content;animation:marquee 55s linear infinite}
.banner-item{font-family:'Bubblegum Sans',cursive;font-size:.9rem;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:.4rem}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* UNIFIED GRID */
.catalog-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto 2.8rem;padding:0 .8rem}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(3,1fr);gap:.9rem}}
@media(min-width:900px){.products-grid{grid-template-columns:repeat(4,1fr);gap:1rem}}

/* PRODUCT CARD */
.product-card{background:var(--card-bg);border-radius:var(--r);border:2.5px solid rgba(155,114,212,.3);overflow:hidden;box-shadow:3px 3px 0 rgba(92,59,143,.2);cursor:pointer;transition:transform .25s,box-shadow .25s;position:relative}
@media(hover:hover){.product-card:hover{transform:translateY(-5px) rotate(-.3deg);box-shadow:6px 8px 0 rgba(92,59,143,.25)}}
.product-card:active{transform:scale(.97)}

/* CAROUSEL */
.card-carousel{position:relative;width:100%;height:180px;overflow:hidden;background:#f0e8ff}
@media(min-width:600px){.card-carousel{height:210px}}
@media(min-width:900px){.card-carousel{height:240px}}
.card-carousel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.card-carousel img.active{opacity:1}
.c-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.c-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.8);cursor:pointer;transition:background .2s,transform .2s}
.c-dots span.active{background:#fff;transform:scale(1.25)}
.c-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(92,59,143,.65);color:#fff;border:none;width:26px;height:26px;border-radius:50%;font-size:.8rem;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.card-carousel:hover .c-arr{opacity:1}
@media(hover:none){.c-arr{opacity:.75;width:30px;height:30px}}
.c-arr.prev{left:5px}.c-arr.next{right:5px}
.expand-btn{position:absolute;top:6px;right:6px;z-index:3;background:rgba(92,59,143,.72);color:#fff;border:none;border-radius:7px;width:26px;height:26px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* CATEGORY BADGE on card */
.cat-badge{position:absolute;top:6px;left:6px;z-index:3;background:var(--purple);color:#fff;font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:50px;text-transform:uppercase;letter-spacing:.4px}

/* CARD BODY */
.product-body{padding:.6rem .7rem .8rem}
.product-name{font-family:'Bubblegum Sans',cursive;font-size:.9rem;color:var(--purple-dark);margin-bottom:.2rem;line-height:1.2}
.product-desc{font-size:.7rem;color:#7a5ba0;line-height:1.45;margin-bottom:.55rem}
.product-footer{display:flex;align-items:center;justify-content:space-between}
.product-price{font-family:'Bubblegum Sans',cursive;font-size:1.2rem;color:var(--purple)}
.cotizar-badge{font-family:'Bubblegum Sans',cursive;font-size:.78rem;color:var(--green);background:#f1f8e9;border:2px solid var(--green);padding:2px 9px;border-radius:50px}
.add-btn{background:var(--purple);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:2px 2px 0 rgba(92,59,143,.4)}
.add-btn:active{transform:scale(.9)}
.add-btn.added{background:#3db88a;animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ORCHID SPECIAL */
.orchid-wrap{background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 50%,#e8f5e9 100%);border-radius:var(--r);border:2.5px solid rgba(155,114,212,.35);box-shadow:4px 4px 0 rgba(92,59,143,.2);overflow:hidden;display:grid;grid-template-columns:1fr;grid-column:1/-1}
@media(min-width:600px){.orchid-wrap{grid-template-columns:1fr 1fr}}
.orchid-carousel{position:relative;height:240px;overflow:hidden;cursor:pointer}
@media(min-width:600px){.orchid-carousel{height:320px}}
.orchid-carousel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.orchid-carousel img.active{opacity:1}
.orchid-carousel .c-arr{opacity:.8}
.orchid-info{padding:1.3rem 1.1rem;display:flex;flex-direction:column;justify-content:center;gap:.7rem}
.orchid-title{font-family:'Bubblegum Sans',cursive;font-size:1.45rem;color:var(--purple-dark);line-height:1.2}
.orchid-sub{font-size:.82rem;color:#7a5ba0;line-height:1.6}
.orchid-types{display:flex;gap:.45rem;flex-wrap:wrap}
.orchid-type{background:rgba(155,114,212,.13);border:2px solid var(--lavender);color:var(--purple-dark);font-weight:700;font-size:.77rem;padding:.3rem .85rem;border-radius:50px}
.orchid-note{font-size:.74rem;color:#9c7bb5;font-style:italic}
.orchid-cta{display:inline-flex;align-items:center;gap:.45rem;background:var(--purple-dark);color:#fff;border:none;border-radius:50px;padding:.65rem 1.4rem;font-family:'Bubblegum Sans',cursive;font-size:.95rem;cursor:pointer;text-decoration:none;width:fit-content;transition:all .2s;box-shadow:3px 3px 0 rgba(92,59,143,.35)}
.orchid-cta:active{transform:scale(.96)}

/* SECTION DIVIDER (lightweight) */
.cat-divider{grid-column:1/-1;text-align:center;padding:1rem 0 .3rem}
.cat-divider h2{font-family:'Bubblegum Sans',cursive;font-size:1.4rem;color:#fff;text-shadow:3px 3px 0 var(--purple-dark);margin-bottom:.2rem}
.cat-divider p{color:rgba(255,255,255,.88);font-size:.8rem;font-weight:600;line-height:1.5}
.cat-divider .section-line{width:50px;height:4px;background:var(--yellow);border-radius:10px;margin:.3rem auto .4rem}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(20,5,45,.93);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s}
.lightbox.open{opacity:1;pointer-events:all}
.lb-wrap{position:relative;max-width:min(88vw,680px);text-align:center}
.lb-wrap img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:14px;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.lb-cap{margin-top:.7rem;color:#fff;font-family:'Bubblegum Sans',cursive;font-size:1rem}
.lb-price{color:var(--yellow);font-size:.9rem;margin-top:.15rem;font-weight:700}
.lb-counter{color:rgba(255,255,255,.55);font-size:.75rem;margin-top:.3rem}
.lb-close{position:absolute;top:-13px;right:-13px;background:var(--yellow);color:var(--purple-dark);border:none;border-radius:50%;width:34px;height:34px;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-nav:hover{background:rgba(255,255,255,.35)}
.lb-nav.prev{left:-50px}.lb-nav.next{right:-50px}
@media(max-width:520px){.lb-nav.prev,.lb-nav.next{top:auto;transform:none;bottom:-52px}.lb-nav.prev{left:calc(50% - 50px)}.lb-nav.next{right:calc(50% - 50px)}}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(80,30,120,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;width:min(350px,100vw);height:100vh;background:var(--cream);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;border-left:3px solid var(--purple)}
.cart-drawer.open{transform:translateX(0)}
.cart-hdr{background:var(--purple);color:#fff;padding:.9rem 1.1rem;font-family:'Bubblegum Sans',cursive;font-size:1.25rem;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1rem;cursor:pointer;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:.9rem 1.1rem}
.cart-empty{text-align:center;padding:2rem 1rem;color:#a07ec8;font-size:.88rem}
.cart-item{display:flex;align-items:center;gap:.65rem;padding:.75rem 0;border-bottom:2px dashed var(--lavender)}
.ci-img{width:44px;height:44px;border-radius:9px;object-fit:cover;flex-shrink:0;border:2px solid var(--lavender)}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:700;font-size:.82rem;color:var(--purple-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:.76rem;color:var(--purple);font-weight:600}
.ci-qty{display:flex;align-items:center;gap:.32rem}
.qty-btn{background:var(--lavender);border:1.5px solid var(--purple);color:var(--purple-dark);width:22px;height:22px;border-radius:5px;font-size:.85rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-weight:800;font-size:.82rem;min-width:15px;text-align:center}
.cart-ftr{padding:.85rem 1.1rem 1.2rem;border-top:2px solid var(--lavender)}
.cart-total{display:flex;justify-content:space-between;font-family:'Bubblegum Sans',cursive;font-size:1.15rem;color:var(--purple-dark);margin-bottom:.85rem}
.checkout-btn{width:100%;background:var(--purple-dark);color:#fff;border:none;border-radius:12px;padding:.75rem;font-family:'Bubblegum Sans',cursive;font-size:.95rem;cursor:pointer;box-shadow:3px 3px 0 rgba(92,59,143,.35)}

/* FOOTER */
footer{position:relative;z-index:1;background:var(--purple-dark);color:rgba(255,255,255,.85);text-align:center;padding:1.8rem 1rem 2.2rem;border-top:4px solid var(--yellow)}
.ft-logo{height:72px;width:auto;margin-bottom:.7rem}
footer p{font-size:.8rem;margin-bottom:.22rem;line-height:1.5}
.ft-socials{margin-top:1rem;display:flex;justify-content:center;gap:.65rem;flex-wrap:wrap}
.ft-socials a{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.14);color:#fff;padding:.45rem 1rem;border-radius:50px;font-size:.78rem;text-decoration:none;font-weight:700;transition:background .2s}
.ft-socials a:hover{background:rgba(255,255,255,.28)}

/* TOAST */
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--purple-dark);color:#fff;padding:.55rem 1.2rem;border-radius:50px;font-weight:700;font-size:.82rem;z-index:400;transition:transform .35s cubic-bezier(.22,1,.36,1);white-space:nowrap;box-shadow:0 5px 18px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* MUSIC BUTTON */
.music-btn{position:fixed;bottom:1.2rem;right:1.2rem;z-index:300;width:46px;height:46px;border-radius:50%;background:var(--purple-dark);border:3px solid var(--yellow);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(92,59,143,.45);transition:transform .3s,box-shadow .3s}
.music-btn:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(92,59,143,.55)}
.music-btn:active{transform:scale(.93)}
.music-btn.playing{animation:pulse-music 1.5s ease-in-out infinite}
.music-btn .note{display:inline-block;transition:transform .3s}
.music-btn.playing .note{animation:bounce-note .6s ease-in-out infinite alternate}
@keyframes pulse-music{0%,100%{box-shadow:0 4px 15px rgba(92,59,143,.45)}50%{box-shadow:0 4px 25px rgba(155,114,212,.7),0 0 0 8px rgba(155,114,212,.15)}}
@keyframes bounce-note{0%{transform:translateY(0) rotate(-5deg)}100%{transform:translateY(-3px) rotate(5deg)}}
</style>
</head>
<body>
<div class="deco">🌸</div><div class="deco">✨</div><div class="deco">🌼</div><div class="deco">💜</div><div class="deco">⭐</div>

function cSlide(id,idx){

function cDir(id,dir){
  const cc=document.getElementById('cc_'+id); if(!cc) return;
  const t=cc.querySelectorAll('img').length;
  cSlide(id,((cIdx[id]||0)+dir+t)%t);
}

function carousel(imgs,id){
  const imgHtml=imgs.map((s,i)=>`<img src="${s}" alt="" class="${i===0?'active':''}" loading="lazy">`).join('');
  const dots=imgs.length>1?`<div class="c-dots">${imgs.map((_,i)=>`<span class="${i===0?'active':''}" onclick="event.stopPropagation();cSlide('${id}',${i})"></span>`).join('')}</div>`:'';
  const arrows=imgs.length>1?`<button class="c-arr prev" onclick="event.stopPropagation();cDir('${id}',-1)">&#8249;</button><button class="c-arr next" onclick="event.stopPropagation();cDir('${id}',1)">&#8250;</button>`:'';

    <span class="cat-badge">${catLabel}</span>
    ${carousel(p.imgs,id)}
    <div class="product-body">
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>

}

// ORCHID CAROUSEL
function orchDir(dir){
  const cc=document.getElementById('orchC'); if(!cc) return;

let lbItems=[],lbIdx=0;
function openLb(cardId,startIdx){
  const numId=parseInt(cardId.replace('p',''));
  let p=PRODUCTS.find(pr=>pr.id===numId);
  if(!p) return;
  lbItems=p.imgs.map(s=>({src:s,name:p.name,price:p.cotizar?'Cotizar':'$'+p.price}));
  lbIdx=startIdx||0; showLb();
  document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden';
}
function openOrchLb(idx){
  lbItems=orchidImgs.map(s=>({src:s,name:'Joyería de Orquídeas',price:'Cotizar'}));
  lbIdx=idx||0; showLb();
  document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden';
}
function showLb(){
  const it=lbItems[lbIdx];
  document.getElementById('lbImg').src=it.src;
  document.getElementById('lbCap').textContent=it.name;
  document.getElementById('lbPrice').textContent=it.price==='Cotizar'?'📩 Precio por cotización':it.price;
  document.getElementById('lbCounter').textContent=lbItems.length>1?`${lbIdx+1} / ${lbItems.length}`:'';
}
function lbNav(d){lbIdx=(lbIdx+d+lbItems.length)%lbItems.length;showLb();}
function lbBg(e){if(e.target===document.getElementById('lightbox'))closeLb();}
function closeLb(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
let lbTx=null;
document.getElementById('lightbox').addEventListener('touchstart',e=>{lbTx=e.touches[0].clientX;},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',e=>{if(lbTx===null)return;if(Math.abs(lbTx-e.changedTouches[0].clientX)>40)lbNav(lbTx>e.changedTouches[0].clientX?1:-1);lbTx=null;},{passive:true});
document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='ArrowRight')lbNav(1);if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='Escape')closeLb();});

let cart=[];
function addToCart(id){
  let p=PRODUCTS.find(pr=>pr.id===id);
  if(!p||p.cotizar) return;
  const ex=cart.find(i=>i.id===id); if(ex)ex.qty++; else cart.push({...p,qty:1});
  updateCart();
  const btn=document.getElementById('btnp'+id);
  if(btn){btn.textContent='✓';btn.classList.add('added');setTimeout(()=>{btn.textContent='+';btn.classList.remove('added');},900);}
  showToast(p.name+' agregado 💜');
}
function changeQty(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)cart=cart.filter(i=>i.id!==id);updateCart();}
function updateCart(){
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0); const cnt=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent=cnt; document.getElementById('cartTotal').textContent='$'+tot.toFixed(2);
  const el=document.getElementById('cartItems');
  if(!cart.length){el.innerHTML='<div class="cart-empty">🌸<br>Tu carrito está vacío</div>';return;}
  el.innerHTML=cart.map(it=>`<div class="cart-item"><img class="ci-img" src="${it.imgs[0]}" alt="${it.name}"><div class="ci-info"><div class="ci-name">${it.name}</div><div class="ci-price">$${(it.price*it.qty).toFixed(2)}</div></div><div class="ci-qty"><button class="qty-btn" onclick="changeQty(${it.id},-1)">−</button><span class="qty-num">${it.qty}</span><button class="qty-btn" onclick="changeQty(${it.id},1)">+</button></div></div>`).join('');
}
function openCart(){document.getElementById('cartDrawer').classList.add('open');document.getElementById('cartOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cartDrawer').classList.remove('open');document.getElementById('cartOverlay').classList.remove('open');document.body.style.overflow='';}
function checkoutWA(){
  if(!cart.length)return;
  const lines=cart.map(i=>`• ${i.qty}x ${i.name} ($${i.price})`).join('%0A');
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0);
  window.open(`https://wa.me/593984241624?text=Hola!%20Quiero%20hacer%20el%20siguiente%20pedido:%0A%0A${lines}%0A%0ATotal:%20$${tot.toFixed(2)}%0A%0AGracias!%20%F0%9F%92%9C`,'_blank');
}

// ═══════════════════════════════════════
// FILTERS — show/hide by category
// ═══════════════════════════════════════
function filterAll(el){
  document.querySelectorAll('[data-cat]').forEach(e=>e.style.display='');
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function filterSection(catId,el){
  document.querySelectorAll('[data-cat]').forEach(e=>{
    e.style.display = e.getAttribute('data-cat')===catId ? '' : 'none';
  });
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  setTimeout(()=>document.getElementById('cat_'+catId)?.scrollIntoView({behavior:'smooth',block:'start'}),50);
}

// NAV scroll active highlighting
document.querySelectorAll('.nav-scroll a').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const catId=a.getAttribute('data-cat');
    // Reset filter to show all first, then scroll
    document.querySelectorAll('[data-cat]').forEach(e=>e.style.display='');
    document.querySelectorAll('.pill').forEach(p=>{
      p.classList.toggle('active', p.getAttribute('data-cat')===catId || (!p.getAttribute('data-cat') && !catId));
    });
    // Filter to category
    document.querySelectorAll('[data-cat]').forEach(e=>{
      e.style.display = e.getAttribute('data-cat')===catId ? '' : 'none';
    });
    // Activate pill
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    const pill=document.querySelector(`.pill[data-cat="${catId}"]`);
    if(pill) pill.classList.add('active');
    setTimeout(()=>document.getElementById('cat_'+catId)?.scrollIntoView({behavior:'smooth',block:'start'}),50);
  });
});

// TOAST
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}

// FADE IN
document.querySelectorAll('.fade-in').forEach(el=>{new IntersectionObserver(([e])=>{if(e.isIntersecting)el.classList.add('visible');},{threshold:.08}).observe(el);});

// MUSIC
const bgMusic=document.getElementById('bgMusic');
const musicBtn=document.getElementById('musicBtn');
bgMusic.volume=0.35;
function toggleMusic(){
  if(bgMusic.paused){bgMusic.play().then(()=>{musicBtn.classList.add('playing');musicBtn.title='Pausar música';showToast('🎵 ¡Música activada!');}).catch(()=>{});}
  else{bgMusic.pause();musicBtn.classList.remove('playing');musicBtn.title='Reproducir música';}
}
</script>
</body>
</html>
